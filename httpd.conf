ServerRoot "/app/apache"
PidFile /app/applications/war/bmon-ai-agent/bmon-ops-frontend/httpd.pid
Listen 19090
ServerName 10.217.136.185:19090

# MIME 타입 (내장 정의)
DefaultType text/plain
AddType text/html .html .htm
AddType text/css .css
AddType application/javascript .js .mjs
AddType application/json .json
AddType image/png .png
AddType image/jpeg .jpg .jpeg
AddType image/gif .gif
AddType image/svg+xml .svg
AddType image/x-icon .ico
AddType font/woff .woff
AddType font/woff2 .woff2
AddType font/ttf .ttf
AddType application/octet-stream .wasm

DirectoryIndex index.html

ErrorLog /dev/null
CustomLog /dev/null combined

DocumentRoot "/app/applications/war/bmon-ai-agent/bmon-ops-frontend/html"

<Directory "/app/applications/war/bmon-ai-agent/bmon-ops-frontend/html">
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Order allow,deny
    Allow from all

    RewriteEngine On
    RewriteBase /
    RewriteRule ^index\.html$ - [L]
    RewriteRule ^_next/ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule . /index.html [L]
</Directory>
